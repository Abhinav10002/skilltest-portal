{% extends 'base.html' %}

{% block content %}
<div style="max-width: 400px; margin: 0 auto; text-align: center;">
    <h2>Student Login</h2>
    <form method="POST" style="background: #f9f9f9; padding: 20px; border-radius: 8px; border: 1px solid #ddd;">
        {% csrf_token %}
        
        <label style="text-align: left; display: block;">Registration Number</label>
        <input type="text" name="registration_number" class="form-control" required>

        <label style="text-align: left; display: block;">Password</label>
        <input type="password" name="password" class="form-control" required>

        <button type="submit" class="btn" style="width: 100%;">Login</button>
    </form>
    <p style="margin-top: 15px;">New here? <a href="{% url 'student_register' %}">Register</a></p>
</div>
{% endblock %}
