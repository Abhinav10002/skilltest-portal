{% extends 'base.html' %}
{% block content %}
<h2>Add Question to: {{ assessment.title }}</h2>

<form method="POST" style="background: #fff; padding: 20px; border: 1px solid #ccc;">
    {% csrf_token %}
    
    <label>Question Text</label>
    <textarea name="question_text" class="form-control" required></textarea>
    
    <label>Marks</label>
    <input type="number" name="marks" value="1" class="form-control" style="width: 100px;">
    
    <h4 style="margin-top: 20px;">Options</h4>
    
    <label>Option 1</label>
    <input type="text" name="option1" class="form-control" required>
    
    <label>Option 2</label>
    <input type="text" name="option2" class="form-control" required>
    
    <label>Option 3</label>
    <input type="text" name="option3" class="form-control" required>
    
    <label>Option 4</label>
    <input type="text" name="option4" class="form-control" required>
    
    <label style="color: green; margin-top: 10px; display:block;">Select Correct Answer</label>
    <select name="correct_option" class="form-control" required>
        <option value="option1">Option 1</option>
        <option value="option2">Option 2</option>
        <option value="option3">Option 3</option>
        <option value="option4">Option 4</option>
    </select>
    
    <button type="submit" class="btn" style="margin-top: 15px;">Save & Add Another</button>
    <a href="{% url 'admin_dashboard' %}" class="btn" style="background-color: #7f8c8d; float: right; margin-top: 15px;">Finish</a>
</form>
{% endblock %}
